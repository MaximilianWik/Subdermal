<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Subdermal favicon. Stylised QR-code finder pattern (the
    concentric-square locator block that appears in the corners
    of every QR code). Pure monochrome so it reads cleanly in
    both light- and dark-themed browser tabs at 16x16.
  -->
  <rect width="32" height="32" rx="6" fill="#000000"/>
  <rect x="4" y="4" width="24" height="24" rx="3" fill="#ffffff"/>
  <rect x="8" y="8" width="16" height="16" rx="2" fill="#000000"/>
  <rect x="13" y="13" width="6" height="6" rx="1" fill="#ffffff"/>
</svg>
